services:
  - type: web
    name: translation-reviewer-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
